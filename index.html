<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Design System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="hero">
    <h1>My Design System</h1>
    <p>Simple page using HTML and CSS variables</p>
    <button class="btn">Get Started</button>
  </header>

  <main class="container">

    <section>
      <h2>Colors</h2>
      <div class="grid">
        <div class="card">
          <h3>Primary Color</h3>
          <p>Used for buttons and important elements.</p>
        </div>

        <div class="card">
          <h3>Secondary Color</h3>
          <p>Used for highlights and hover states.</p>
        </div>
      </div>
    </section>

    <section>
      <h2>Components</h2>
      <div class="grid">
        <div class="card">
          <h3>Button</h3>
          <p>This button uses my variables.</p>
          <button class="btn">Click Me</button>
        </div>

        <div class="card">
          <h3>Card</h3>
          <p>This is a simple reusable card.</p>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
